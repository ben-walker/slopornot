version: 2
updates:
  - package-ecosystem: "npm"
    directory: "api/"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "web/"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "api/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "web/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker-compose"
    directory: "api/"
    schedule:
      interval: "weekly"
